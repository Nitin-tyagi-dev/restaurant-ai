spring.datasource.url=jdbc:h2:mem:restaurantdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Allow frontend dev server on whichever local port Vite uses
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*


# Optional Groq key. Leave blank to use the built-in local fallback assistant.
groq.api.key=${GROQ_API_KEY:}
groq.model=llama3-70b-8192

